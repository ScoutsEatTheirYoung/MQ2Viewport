name: Build and Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          # Install LLVM 19 from the official LLVM apt repo
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main" | sudo tee /etc/apt/sources.list.d/llvm19.list
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build \
            clang-19 lld-19 llvm-19 \
            libspdlog-dev libfmt-dev libglm-dev
          # Create unversioned symlinks for tools called by name in build scripts
          for tool in llvm-dlltool llvm-ar llvm-nm llvm-lib; do
            sudo ln -sf /usr/bin/${tool}-19 /usr/local/bin/${tool}
          done

      - name: Restore xwin cache
        id: cache-xwin
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.xwin-cache
            ~/.cargo/bin/xwin
          key: xwin-x86-v4
          restore-keys: xwin-x86-

      - name: Install xwin
        run: command -v xwin || cargo install xwin

      - name: Fetch Windows SDK
        id: xwin-fetch
        run: |
          # Check if splat is already complete
          if [ -d ~/.xwin-cache/splat/crt ] && [ -d ~/.xwin-cache/splat/sdk ]; then
            echo "xwin splat already complete, skipping download"
            exit 0
          fi
          # xwin is idempotent — skips .cab files already in ~/.xwin-cache.
          # Partial downloads are saved to cache below so subsequent runs resume.
          for attempt in $(seq 1 10); do
            echo "xwin attempt $attempt..."
            xwin --accept-license --arch x86 --http-retry 10 splat \
              --output ~/.xwin-cache/splat && exit 0
            [ $attempt -lt 10 ] && sleep 60
          done
          exit 1

      - name: Save xwin cache
        if: always() && steps.cache-xwin.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.xwin-cache
            ~/.cargo/bin/xwin
          key: xwin-x86-${{ github.run_id }}

      - name: Clone MacroQuest EMU branch
        run: |
          git clone --depth=1 --branch emu \
            https://github.com/macroquest/macroquest \
            ../macroquest
          git -C ../macroquest submodule update --init src/eqlib

      - name: Download DirectX SDK headers
        run: |
          mkdir -p build/dxsdk
          curl -sL -o build/dxsdk/dxsdk.zip \
            "https://www.nuget.org/api/v2/package/Microsoft.DXSDK.D3DX/9.29.952.8"
          unzip -q build/dxsdk/dxsdk.zip -d build/dxsdk/pkg
          mkdir -p build/dxsdk/headers/dxsdk-d3dx
          cp build/dxsdk/pkg/build/native/include/* build/dxsdk/headers/dxsdk-d3dx/

      - name: Download WIL headers
        run: |
          mkdir -p build/wil
          curl -sL -o build/wil/wil.zip \
            "https://www.nuget.org/api/v2/package/Microsoft.Windows.ImplementationLibrary"
          unzip -q build/wil/wil.zip -d build/wil/pkg

      - name: Set up third-party header symlinks
        run: |
          mkdir -p build/thirdparty_headers
          ln -sf /usr/include/spdlog  build/thirdparty_headers/spdlog
          ln -sf /usr/include/fmt     build/thirdparty_headers/fmt
          ln -sf /usr/include/glm     build/thirdparty_headers/glm
          ln -sf $PWD/build/wil/pkg/include/wil build/thirdparty_headers/wil

      - name: Build stub import libraries
        run: |
          mkdir -p build/stubs
          llvm-dlltool -m i386 --input-def MQ2Main.def --output-lib build/stubs/MQ2Main.lib
          llvm-dlltool -m i386 --input-def eqlib.def   --output-lib build/stubs/eqlib.lib
          # Empty stubs for libs referenced by #pragma comment in MQ headers
          for lib in detours imgui imgui-64 pluginapi; do
            llvm-ar rcs build/stubs/${lib}.lib
          done

      - name: Apply eqlib header patches
        run: |
          mkdir -p build/patches/eqlib/game
          cp ../macroquest/src/eqlib/include/eqlib/game/CXStr.h build/patches/eqlib/game/CXStr.h
          sed -i 's/compare(pos1, count1, 2,/compare(pos1, count1, std::string_view{t},/' \
            build/patches/eqlib/game/CXStr.h
          cp ../macroquest/src/eqlib/include/eqlib/game/SoeUtil.h build/patches/eqlib/game/SoeUtil.h
          sed -i 's/m_rep->m_strongRefs : 0/m_rep->m_strongRefs.load() : 0/' \
            build/patches/eqlib/game/SoeUtil.h

      - name: Configure
        run: |
          cmake -B build/cmake -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=toolchain-win32-clang.cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/cmake --target MQ2Camera

      - name: Verify output
        run: file build/cmake/bin/MQ2Camera.dll

      - name: Create or update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          body: |
            Automated build from commit ${{ github.sha }}
            ${{ github.event.head_commit.message }}
          files: build/cmake/bin/MQ2Camera.dll
